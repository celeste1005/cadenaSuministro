version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proyectocd-postgres
    restart: always
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proyectocd
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d proyectocd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proyectocd-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: proyectocd-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://usuario:password@postgres:5432/proyectocd?schema=public
      PORT: 4000
      JWT_SECRET: cambia-esto-en-produccion
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/dist:/app/packages/shared/dist
    command: ["pnpm", "--dir", "apps/api", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: proyectocd-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DOCKER: "true"
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    command: ["pnpm", "--dir", "apps/web", "dev"]
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
